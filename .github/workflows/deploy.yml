name: Test, deploy Worker and publish docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Load the single Cloudflare JSON secret
        env:
          CONFIG_INPUT: ${{ secrets.CLOUDFLARE_CONFIG_JSON }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          let raw = (process.env.CONFIG_INPUT || '').trim();
          if (!raw) throw new Error('Missing repository secret CLOUDFLARE_CONFIG_JSON');

          raw = raw.replace(/^CLOUDFLARE_CONFIG_JSON\s*=\s*/, '').replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
          let cfg;
          try {
            cfg = JSON.parse(raw);
          } catch (jsonError) {
            try { cfg = JSON.parse(Buffer.from(raw, 'base64').toString('utf8')); }
            catch { throw new Error(`Invalid CLOUDFLARE_CONFIG_JSON: ${jsonError.message}. See docs/DEPLOY.md`); }
          }

          if (!cfg || Array.isArray(cfg) || typeof cfg !== 'object') throw new Error('Cloudflare config must be a JSON object');
          const accountId = String(cfg.accountId || '').trim();
          if (!accountId) throw new Error('accountId is required');
          fs.appendFileSync(process.env.GITHUB_ENV, `CLOUDFLARE_ACCOUNT_ID=${accountId}\n`);

          const apiToken = String(cfg.apiToken || '').trim();
          const globalApiKey = String(cfg.globalApiKey || '').trim();
          const email = String(cfg.email || '').trim();

          if (apiToken) {
            if (apiToken.includes('***')) throw new Error('apiToken is masked or incomplete');
            console.log('Cloudflare auth mode: scoped API Token');
            console.log(`::add-mask::${apiToken}`);
            fs.appendFileSync(process.env.GITHUB_ENV, `CLOUDFLARE_API_TOKEN=${apiToken}\n`);
          } else if (globalApiKey && email) {
            if (globalApiKey.includes('***')) throw new Error('globalApiKey is masked or incomplete');
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error('email is invalid');
            console.log('Cloudflare auth mode: Global API Key + email (legacy, broad access)');
            console.log(`::add-mask::${globalApiKey}`);
            console.log(`::add-mask::${email}`);
            fs.appendFileSync(process.env.GITHUB_ENV, `CLOUDFLARE_API_KEY=${globalApiKey}\nCLOUDFLARE_EMAIL=${email}\n`);
          } else {
            throw new Error('Provide either apiToken, or both globalApiKey and email');
          }
          NODE
      - name: Verify Cloudflare authentication
        run: npx wrangler@latest whoami
      - name: Deploy Worker
        run: npx wrangler@latest deploy

  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
