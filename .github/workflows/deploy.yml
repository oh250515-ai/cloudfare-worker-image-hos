name: Test, deploy Worker and publish docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Validate the single Cloudflare secret
        env:
          CONFIG_INPUT: ${{ secrets.CLOUDFLARE_CONFIG_JSON }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          let raw = (process.env.CONFIG_INPUT || '').trim();
          if (!raw) throw new Error('Missing repository secret CLOUDFLARE_CONFIG_JSON');

          // Accept strict JSON, base64-encoded JSON, or an accidentally pasted
          // CLOUDFLARE_CONFIG_JSON= prefix. Never print credential contents.
          raw = raw.replace(/^CLOUDFLARE_CONFIG_JSON\s*=\s*/, '').replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
          let cfg;
          try {
            cfg = JSON.parse(raw);
          } catch (jsonError) {
            try {
              cfg = JSON.parse(Buffer.from(raw, 'base64').toString('utf8'));
            } catch {
              throw new Error(`CLOUDFLARE_CONFIG_JSON is invalid JSON at ${jsonError.message}. Use one line: {"accountId":"...","apiToken":"..."}`);
            }
          }

          if (!cfg || Array.isArray(cfg) || typeof cfg !== 'object') throw new Error('CLOUDFLARE_CONFIG_JSON must be a JSON object');
          if (!cfg.accountId || typeof cfg.accountId !== 'string') throw new Error('CLOUDFLARE_CONFIG_JSON.accountId is required');
          if (!cfg.apiToken || typeof cfg.apiToken !== 'string') {
            if (cfg.globalApiKey) throw new Error('Global API Key is not accepted by current Wrangler CI. Create a scoped API Token and set it as apiToken. Account ID plus Global API Key cannot create/authenticate a token without the Cloudflare user email.');
            throw new Error('CLOUDFLARE_CONFIG_JSON.apiToken is required');
          }
          if (cfg.apiToken.includes('***')) throw new Error('apiToken contains masked placeholder characters, paste the real scoped API Token');

          console.log(`::add-mask::${cfg.apiToken}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `CLOUDFLARE_ACCOUNT_ID=${cfg.accountId.trim()}\nCLOUDFLARE_API_TOKEN=${cfg.apiToken.trim()}\n`);
          NODE
      - name: Verify Cloudflare authentication
        run: npx wrangler@latest whoami
      - name: Deploy Worker
        run: npx wrangler@latest deploy

  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
